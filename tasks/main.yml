---
- name: Set up storage backend (OS-specific)
  include_tasks: "backend-{{ ansible_os_family | lower }}.yml"
  when: pulsar_relay_storage_backend == "valkey"

- name: Install Python3 and venv (Debian/Ubuntu)
  apt:
    name:
      - python3
      - python3-venv
      - python3-pip
    state: present
    update_cache: yes
  when: ansible_os_family == "Debian"

- name: Install Python3 and pip (RedHat/Rocky)
  dnf:
    name:
      - python3
      - python3-pip
      - git
    state: present
  when: ansible_os_family == "RedHat"

- name: Create pulsar-relay venv directory
  file:
    path: "{{ pulsar_relay_venv }}"
    state: directory
    owner: "{{ pulsar_relay_user }}"
    mode: "0755"

- name: Install pulsar-relay from GitHub
  pip:
    name: "git+https://github.com/galaxyproject/pulsar-relay.git@{{ pulsar_relay_version }}"
    virtualenv: "{{ pulsar_relay_venv }}"
    virtualenv_command: python3 -m venv
  become_user: "{{ pulsar_relay_user }}"

- name: Deploy pulsar-relay environment file
  template:
    src: pulsar-relay.env.j2
    dest: /etc/pulsar-relay.env
    owner: root
    group: root
    mode: "0600"
  notify:
    - reload systemd
    - restart pulsar-relay

- name: Deploy systemd service
  template:
    src: pulsar-relay.service.j2
    dest: /etc/systemd/system/pulsar-relay.service
    owner: root
    group: root
    mode: "0644"
  notify: reload systemd

- name: Enable and start pulsar-relay
  systemd:
    name: pulsar-relay
    enabled: true
    state: started
